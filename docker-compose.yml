services:
  postgres:
    image: postgres:16-alpine
    container_name: checkflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-checkflow}
      POSTGRES_USER: ${POSTGRES_USER:-checkflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-checkflow}
    ports:
      - "5432:5432"
    volumes:
      - checkflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-checkflow} -d ${POSTGRES_DB:-checkflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  checkflow-postgres-data:
